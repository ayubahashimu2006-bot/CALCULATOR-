<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Calculator</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.calculator {
    width: 350px;
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.display {
    width: 100%;
    height: 80px;
    border-radius: 15px;
    background: rgba(0,0,0,0.6);
    color: #0ff;
    font-size: 28px;
    text-align: right;
    padding: 15px;
    margin-bottom: 10px;
    overflow-x: auto;
}

.history {
    font-size: 14px;
    color: #aaa;
    text-align: right;
    height: 20px;
    margin-bottom: 10px;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #00ffff;
    color: black;
    transform: scale(1.05);
}

.operator {
    color: #00ffff;
}

.equal {
    grid-column: span 2;
    background: #00ffff;
    color: black;
    font-weight: bold;
}

.equal:hover {
    background: #00cccc;
}

</style>
</head>

<body>

<div class="calculator">
    <div class="history" id="history"></div>
    <div class="display" id="display">0</div>

    <div class="buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="append('%')">%</button>
        <button onclick="append('/')">÷</button>
        <button onclick="append('Math.sqrt(')">√</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')">×</button>
        <button onclick="append('Math.pow(')">xʸ</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')">−</button>
        <button onclick="append('Math.log10(')">log</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')">+</button>
        <button onclick="append('Math.sin(')">sin</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="append(')')">)</button>
        <button onclick="append('Math.cos(')">cos</button>
        <button onclick="append('Math.tan(')">tan</button>

        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
let display = document.getElementById("display");
let history = document.getElementById("history");

function append(value) {
    if (display.innerText === "0") {
        display.innerText = value;
    } else {
        display.innerText += value;
    }
}

function clearDisplay() {
    display.innerText = "0";
    history.innerText = "";
}

function backspace() {
    display.innerText = display.innerText.slice(0, -1) || "0";
}

function calculate() {
    try {
        history.innerText = display.innerText;
        let result = eval(display.innerText);
        display.innerText = result;
    } catch {
        display.innerText = "Error";
    }
}

/* Keyboard Support */
document.addEventListener("keydown", function(e) {
    if (!isNaN(e.key) || "+-*/.%".includes(e.key)) {
        append(e.key);
    }
    if (e.key === "Enter") calculate();
    if (e.key === "Backspace") backspace();
    if (e.key === "Escape") clearDisplay();
});
</script>

</body>
</html>
