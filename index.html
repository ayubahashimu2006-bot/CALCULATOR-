<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCalc Pro X World Edition</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

:root{
  --bg1:#050816;
  --bg2:#0f172a;
  --card:rgba(255,255,255,0.07);
  --text:#fff;
  --accent:#00d4ff;
}

body.light{
  --bg1:#e2e8f0;
  --bg2:#f8fafc;
  --card:rgba(0,0,0,0.05);
  --text:#0f172a;
  --accent:#2563eb;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
  transition:0.4s;
}

/* BACKGROUND GLOW */
body::before{
  content:"";
  position:absolute;
  width:350px;
  height:350px;
  background:var(--accent);
  filter:blur(140px);
  opacity:0.25;
  z-index:-1;
}

/* APP */
.app{
  width:390px;
  padding:18px;
  border-radius:25px;
  background:var(--card);
  backdrop-filter:blur(25px);
  box-shadow:0 30px 80px rgba(0,0,0,0.5);
  animation:fade 0.7s ease;
}

@keyframes fade{
  from{transform:translateY(20px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.top h1{
  font-size:16px;
  letter-spacing:1px;
}

.top button{
  border:none;
  background:transparent;
  font-size:20px;
  color:var(--text);
}

/* DISPLAY */
.display{
  font-size:42px;
  text-align:right;
  padding:18px;
  border-radius:18px;
  background:rgba(0,0,0,0.3);
  margin-bottom:10px;
  overflow-x:auto;
}

/* HISTORY */
.history{
  font-size:12px;
  opacity:0.6;
  text-align:right;
  height:18px;
}

/* MODE */
.modes{
  display:flex;
  gap:6px;
  margin:10px 0;
}

.modes button{
  flex:1;
  padding:9px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:var(--text);
}

/* PANELS */
.panel{display:none;}
.active{display:block;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

/* BUTTONS */
button{
  padding:14px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  color:var(--text);
  font-size:15px;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
  background:var(--accent);
  color:black;
}

/* BOTTOM EQUAL BUTTON */
.equal{
  grid-column:span 4;
  background:var(--accent);
  color:black;
  font-weight:700;
  font-size:18px;
}

/* INPUTS */
input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:var(--text);
}
</style>
</head>

<body>

<div class="app">

<div class="top">
  <h1>SmartCalc Pro X 🌍</h1>
  <button onclick="toggleTheme()">🌗</button>
</div>

<div class="history" id="history"></div>
<div class="display" id="display">0</div>

<div class="modes">
  <button onclick="show('calc')">Calc</button>
  <button onclick="show('currency')">FX</button>
  <button onclick="show('unit')">Units</button>
</div>

<!-- CALCULATOR -->
<div id="calc" class="panel active">
  <div class="grid">

    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('/')">÷</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('*')">×</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('-')">−</button>

    <button onclick="add('0')">0</button>
    <button onclick="add('.')">.</button>
    <button onclick="clearAll()">C</button>
    <button onclick="back()">⌫</button>

    <button class="equal" onclick="calc()">=</button>

  </div>
</div>

<!-- CURRENCY -->
<div id="currency" class="panel">
  <h3>Global Currency 🌍</h3>

  <input id="amount" placeholder="Amount">

  <select id="from">
    <option>USD</option><option>EUR</option><option>GBP</option><option>NGN</option>
  </select>

  <select id="to">
    <option>NGN</option><option>USD</option><option>EUR</option><option>GBP</option>
  </select>

  <button onclick="convert()">Convert</button>
  <p id="result"></p>
</div>

<!-- UNIT -->
<div id="unit" class="panel">
  <h3>Global Unit Converter 📏⚖️</h3>

  <select>
    <option>Length</option>
    <option>Mass</option>
    <option>Volume</option>
    <option>Speed</option>
    <option>Energy</option>
  </select>

  <input id="unitValue" placeholder="Value">

  <button onclick="unitConvert()">Convert</button>
  <p id="unitResult"></p>
</div>

</div>

<script>

let display=document.getElementById("display");
let history=document.getElementById("history");

/* CALC */
function add(v){
  if(display.innerText==="0") display.innerText=v;
  else display.innerText+=v;
}

function calc(){
  try{
    history.innerText=display.innerText;
    display.innerText=Function("return "+display.innerText)();
  }catch{
    display.innerText="Error";
  }
}

function clearAll(){display.innerText="0";}
function back(){display.innerText=display.innerText.slice(0,-1)||"0";}

/* HISTORY BUTTON (simple memory) */
function showHistory(){
  alert("Last: " + history.innerText);
}

/* MODE SWITCH */
function show(id){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* GLOBAL FX (demo logic) */
function convert(){
  let amt=document.getElementById("amount").value;
  let from=document.getElementById("from").value;
  let rate=1500;

  document.getElementById("result").innerText=
  from==="USD" ? amt*rate+" NGN" : amt/rate+" USD";
}

/* UNIT (GLOBAL SIMPLIFIED ENGINE) */
function unitConvert(){
  let v=document.getElementById("unitValue").value;
  document.getElementById("unitResult").innerText=
  "Converted Value: " + (v/1000);
}

</script>

</body>
</html>
