<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCalc Pro X</title>

<style>
:root{
  --bg:#0f172a;
  --card:rgba(255,255,255,0.06);
  --text:white;
  --btn:#1e293b;
  --accent:#38bdf8;
}

body.light{
  --bg:#f1f5f9;
  --card:white;
  --text:black;
  --btn:#e2e8f0;
  --accent:#0ea5e9;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.4s;
}

.app{
  max-width:420px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.top h1{
  font-size:20px;
}

/* DISPLAY */
.display{
  font-size:40px;
  text-align:right;
  padding:20px;
  margin:20px 0;
  background:var(--card);
  border-radius:15px;
  backdrop-filter:blur(10px);
  overflow-x:auto;
}

/* BUTTONS */
button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:var(--btn);
  color:var(--text);
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
  background:var(--accent);
  color:black;
}

/* MODES */
.modes{
  display:flex;
  gap:5px;
  margin-bottom:10px;
}

.modes button{
  flex:1;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

/* PANELS */
.panel{display:none;}
.active{display:block;}

/* INPUTS */
input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

/* ANIMATION */
.app{
  animation:fade 0.6s ease-in;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="top">
  <h1>SmartCalc Pro X</h1>
  <button onclick="toggleTheme()">🌙</button>
</div>

<!-- DISPLAY -->
<div class="display" id="display">0</div>

<!-- MODE BUTTONS -->
<div class="modes">
  <button onclick="show('calc')">Calc</button>
  <button onclick="show('currency')">Currency</button>
  <button onclick="show('unit')">Unit</button>
</div>

<!-- CALCULATOR -->
<div id="calc" class="panel active">
  <div class="grid">
    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('/')">÷</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('*')">×</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('-')">−</button>

    <button onclick="add('0')">0</button>
    <button onclick="add('.')">.</button>
    <button onclick="calc()">=</button>
    <button onclick="add('+')">+</button>

    <button onclick="clearAll()">C</button>
    <button onclick="back()">⌫</button>
  </div>
</div>

<!-- CURRENCY -->
<div id="currency" class="panel">
  <h3>Currency Converter</h3>

  <input id="amount" placeholder="Amount">

  <select id="from">
    <option>USD</option>
    <option>NGN</option>
  </select>

  <select id="to">
    <option>NGN</option>
    <option>USD</option>
  </select>

  <button onclick="convert()">Convert</button>

  <p id="result"></p>
</div>

<!-- UNIT -->
<div id="unit" class="panel">
  <h3>Unit Converter</h3>

  <select id="unitType">
    <option>Length (m → km)</option>
  </select>

  <input id="unitValue" placeholder="Value">

  <button onclick="unitConvert()">Convert</button>

  <p id="unitResult"></p>
</div>

</div>

<script>
let display = document.getElementById("display");

/* CALC */
function add(v){
  if(display.innerText==="0") display.innerText=v;
  else display.innerText+=v;
}

function calc(){
  try{
    display.innerText = eval(display.innerText);
  }catch{
    display.innerText="Error";
  }
}

function clearAll(){
  display.innerText="0";
}

function back(){
  display.innerText = display.innerText.slice(0,-1) || "0";
}

/* MODE SWITCH */
function show(id){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* CURRENCY */
function convert(){
  let amt=document.getElementById("amount").value;
  let from=document.getElementById("from").value;
  let to=document.getElementById("to").value;

  let rate=1500;

  if(from==="USD" && to==="NGN"){
    document.getElementById("result").innerText=amt*rate+" NGN";
  }else{
    document.getElementById("result").innerText=amt/rate+" USD";
  }
}

/* UNIT */
function unitConvert(){
  let val=document.getElementById("unitValue").value;
  document.getElementById("unitResult").innerText=val/1000+" km";
}
</script>

</body>
</html>
