<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Pro Calculator v2</title>

<style>
:root{
    --bg:#0b1220;
    --card:rgba(255,255,255,0.06);
    --text:#00f7ff;
    --white:#fff;
}

body.light{
    --bg:#e9eef5;
    --card:#ffffff;
    --text:#0077ff;
    --white:#000;
}

*{
    margin:0;
    padding:0;
    font-family:Segoe UI;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg);
    transition:0.3s;
}

.app{
    display:flex;
    gap:15px;
}

/* SIDEBAR */
.sidebar{
    width:120px;
    padding:10px;
    border-radius:20px;
    background:var(--card);
    backdrop-filter:blur(20px);
    color:var(--white);
}

.sidebar button{
    width:100%;
    margin:5px 0;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#00f7ff;
    color:black;
}

/* CALC */
.calc{
    width:380px;
    padding:15px;
    border-radius:25px;
    background:var(--card);
    backdrop-filter:blur(20px);
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.display{
    height:90px;
    padding:15px;
    font-size:28px;
    text-align:right;
    border-radius:15px;
    background:rgba(0,0,0,0.5);
    color:var(--text);
    overflow:auto;
}

.history{
    font-size:12px;
    color:gray;
    text-align:right;
    height:18px;
}

/* BUTTONS */
.buttons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
    margin-top:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:rgba(255,255,255,0.1);
    color:var(--white);
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
    background:var(--text);
    color:black;
}

.equal{
    grid-column:span 2;
    background:var(--text);
    color:black;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="history.innerText=''">History</button>
    <button onclick="alert('Converter coming soon')">Convert</button>
</div>

<!-- CALCULATOR -->
<div class="calc">

<div class="history" id="history"></div>
<div class="display" id="display">0</div>

<div class="buttons">

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">÷</button>
<button onclick="append('Math.sqrt(')">√</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">×</button>
<button onclick="append('Math.pow(')">xʸ</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('-')">−</button>
<button onclick="append('Math.log10(')">log</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="append('+')">+</button>
<button onclick="append('Math.sin(')">sin</button>
<button onclick="append('Math.cos(')">cos</button>

<button onclick="append('Math.tan(')">tan</button>
<button onclick="append('Math.PI')">π</button>
<button onclick="append('Math.E')">e</button>
<button onclick="back()">⌫</button>
<button onclick="calculate()" class="equal">=</button>

</div>
</div>
</div>

<script>

let display=document.getElementById("display");
let history=document.getElementById("history");

function beep(){
    try{
        navigator.vibrate(20);
    }catch(e){}
}

function append(v){
    beep();
    if(display.innerText==="0") display.innerText=v;
    else display.innerText+=v;
}

function back(){
    display.innerText=display.innerText.slice(0,-1)||"0";
}

function clearAll(){
    display.innerText="0";
    history.innerText="";
}

function calculate(){
    try{
        history.innerText=display.innerText;

        let exp=display.innerText;

        let result = Function('"use strict"; return ('+exp+')')();

        display.innerText=result;

    }catch(e){
        display.innerText="Error";
    }
}

function toggleTheme(){
    document.body.classList.toggle("light");
}

/* keyboard */
document.addEventListener("keydown",(e)=>{
    if(!isNaN(e.key)||"+-*/().".includes(e.key)){
        append(e.key);
    }
    if(e.key==="Enter") calculate();
    if(e.key==="Backspace") back();
});
</script>

</body>
</html>
