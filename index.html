<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Scientific Calculator</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f172a,#020617);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.app{
width:360px;
border-radius:25px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
overflow:hidden;
}

/* DISPLAY */
.display{
padding:20px;
font-size:32px;
text-align:right;
background:rgba(0,0,0,0.6);
color:#00f7ff;
min-height:80px;
}

/* HISTORY PANEL */
.history{
max-height:0;
overflow:hidden;
background:rgba(0,0,0,0.3);
transition:0.3s;
padding:0 15px;
font-size:12px;
color:#aaa;
}

.history.show{
max-height:120px;
padding:10px 15px;
}

/* BUTTONS */
.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:15px;
}

button{
padding:18px;
border:none;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
font-size:16px;
cursor:pointer;
transition:0.15s;
}

button:hover{
background:#00f7ff;
color:black;
transform:scale(1.05);
}

.op{color:#00f7ff;}
.equal{
background:#00f7ff;
color:black;
grid-column:span 2;
}
.topbar{
display:flex;
justify-content:space-between;
padding:10px 15px;
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<div class="app">

<div class="topbar">
<span>Pro Calc</span>
<span onclick="toggleHistory()" style="cursor:pointer;">History</span>
</div>

<div class="history" id="history"></div>

<div class="display" id="display">0</div>

<div class="buttons">

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="op" onclick="append('/')">÷</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="op" onclick="append('*')">×</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="op" onclick="append('-')">−</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="clearAll()">C</button>
<button class="op" onclick="append('+')">+</button>

<button onclick="append('Math.sin(')">sin</button>
<button onclick="append('Math.cos(')">cos</button>
<button onclick="append('Math.sqrt(')">√</button>
<button onclick="append('Math.PI')">π</button>

<button onclick="back()">⌫</button>
<button onclick="calculate()" class="equal">=</button>

</div>
</div>

<script>

let display=document.getElementById("display");
let history=document.getElementById("history");

function append(v){
if(display.innerText==="0") display.innerText=v;
else display.innerText+=v;
}

function clearAll(){
display.innerText="0";
}

function back(){
display.innerText=display.innerText.slice(0,-1)||"0";
}

function calculate(){
try{
let exp=display.innerText;
history.innerHTML+="<div>"+exp+"</div>";
display.innerText=Function('"use strict";return ('+exp+')')();
}catch{
display.innerText="Error";
}
}

function toggleHistory(){
history.classList.toggle("show");
}

</script>

</body>
</html>
