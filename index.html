<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ultra Pro Scientific Calculator</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #111827, #030712);
}

.calculator {
    width: 380px;
    border-radius: 25px;
    padding: 18px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(25px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
}

.header {
    display: flex;
    justify-content: space-between;
    color: #aaa;
    font-size: 12px;
    margin-bottom: 10px;
}

.display {
    height: 90px;
    border-radius: 15px;
    background: rgba(0,0,0,0.7);
    color: #00f7ff;
    font-size: 30px;
    padding: 15px;
    text-align: right;
    overflow-x: auto;
}

.history {
    height: 20px;
    font-size: 12px;
    color: #888;
    text-align: right;
    margin-bottom: 8px;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-top: 15px;
}

button {
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.15s ease-in-out;
}

button:hover {
    background: #00f7ff;
    color: black;
    transform: scale(1.05);
}

.operator {
    color: #00f7ff;
}

.equal {
    grid-column: span 2;
    background: #00f7ff;
    color: black;
    font-weight: bold;
}

.equal:hover {
    background: #00c2cc;
}
</style>
</head>

<body>

<div class="calculator">

    <div class="header">
        <div>Scientific Pro Mode</div>
        <div>Ultra UI</div>
    </div>

    <div class="history" id="history"></div>
    <div class="display" id="display">0</div>

    <div class="buttons">

        <!-- Row 1 -->
        <button onclick="clearDisplay()">AC</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="append('%')">%</button>
        <button onclick="append('/')">÷</button>
        <button onclick="append('**')">xʸ</button>

        <!-- Row 2 -->
        <button onclick="append('Math.sin(')">sin</button>
        <button onclick="append('Math.cos(')">cos</button>
        <button onclick="append('Math.tan(')">tan</button>
        <button onclick="append('Math.sqrt(')">√</button>
        <button onclick="append('Math.log10(')">log</button>

        <!-- Row 3 -->
        <button onclick="append('Math.log(')">ln</button>
        <button onclick="append('Math.PI')">π</button>
        <button onclick="append('Math.E')">e</button>
        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>

        <!-- Row 4 -->
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')">×</button>
        <button onclick="append('/')">÷</button>

        <!-- Row 5 -->
        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')">−</button>
        <button onclick="append('+')">+</button>

        <!-- Row 6 -->
        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('.')">.</button>
        <button onclick="append('0')">0</button>

        <!-- Equal -->
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
let display = document.getElementById("display");
let history = document.getElementById("history");

function append(value) {
    if (display.innerText === "0") {
        display.innerText = value;
    } else {
        display.innerText += value;
    }
}

function clearDisplay() {
    display.innerText = "0";
    history.innerText = "";
}

function backspace() {
    display.innerText = display.innerText.slice(0, -1) || "0";
}

/* safer evaluation than eval */
function calculate() {
    try {
        history.innerText = display.innerText;

        let result = Function('"use strict"; return (' + display.innerText + ')')();

        display.innerText = result;
    } catch (e) {
        display.innerText = "Error";
    }
}

/* keyboard support */
document.addEventListener("keydown", (e) => {
    if (!isNaN(e.key) || "+-*/.%()".includes(e.key)) {
        append(e.key);
    }
    if (e.key === "Enter") calculate();
    if (e.key === "Backspace") backspace();
    if (e.key === "Escape") clearDisplay();
});
</script>

</body>
</html>
