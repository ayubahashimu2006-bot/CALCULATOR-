<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCalc Pro X Ultra</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

:root{
  --bg1:#0f172a;
  --bg2:#1e293b;
  --card:rgba(255,255,255,0.08);
  --text:#ffffff;
  --accent:#38bdf8;
}

body.light{
  --bg1:#e2e8f0;
  --bg2:#f8fafc;
  --card:rgba(0,0,0,0.05);
  --text:#0f172a;
  --accent:#0ea5e9;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
  transition:0.5s;
}

/* FLOATING BACKGROUND EFFECT */
body::before{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  background:var(--accent);
  filter:blur(120px);
  opacity:0.3;
  top:10%;
  left:20%;
  z-index:-1;
}

/* MAIN APP */
.app{
  width:380px;
  padding:20px;
  border-radius:25px;
  background:var(--card);
  backdrop-filter:blur(20px);
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{transform:translateY(20px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.top h1{
  font-size:18px;
  font-weight:600;
  letter-spacing:1px;
}

.top button{
  border:none;
  background:transparent;
  font-size:20px;
  cursor:pointer;
  color:var(--text);
}

/* DISPLAY */
.display{
  font-size:42px;
  text-align:right;
  padding:20px;
  border-radius:18px;
  background:rgba(0,0,0,0.25);
  margin:15px 0;
  overflow-x:auto;
  transition:0.3s;
}

/* MODE BUTTONS */
.modes{
  display:flex;
  gap:8px;
  margin-bottom:15px;
}

.modes button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  color:var(--text);
  cursor:pointer;
  transition:0.3s;
}

.modes button:hover{
  background:var(--accent);
  color:black;
}

/* PANELS */
.panel{display:none;}
.active{display:block;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

/* BUTTONS */
button{
  padding:15px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  color:var(--text);
  font-size:15px;
  cursor:pointer;
  transition:0.25s;
  position:relative;
  overflow:hidden;
}

button:hover{
  transform:scale(1.05);
  background:var(--accent);
  color:black;
}

/* RIPPLE EFFECT */
button:active::after{
  content:"";
  position:absolute;
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.4);
  border-radius:50%;
  transform:scale(0);
  animation:ripple 0.5s linear;
}

@keyframes ripple{
  to{
    transform:scale(3);
    opacity:0;
  }
}

/* INPUTS */
input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:var(--text);
}

/* SMALL TEXT */
p{
  margin-top:10px;
  font-weight:500;
}
</style>
</head>

<body>

<div class="app">

<!-- TOP -->
<div class="top">
  <h1>SmartCalc Pro X+</h1>
  <button onclick="toggleTheme()">🌗</button>
</div>

<!-- DISPLAY -->
<div class="display" id="display">0</div>

<!-- MODES -->
<div class="modes">
  <button onclick="show('calc')">Calc</button>
  <button onclick="show('currency')">Currency</button>
  <button onclick="show('unit')">Unit</button>
</div>

<!-- CALCULATOR -->
<div id="calc" class="panel active">
  <div class="grid">
    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('/')">÷</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('*')">×</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('-')">−</button>

    <button onclick="add('0')">0</button>
    <button onclick="add('.')">.</button>
    <button onclick="calc()">=</button>
    <button onclick="add('+')">+</button>

    <button onclick="clearAll()">C</button>
    <button onclick="back()">⌫</button>
  </div>
</div>

<!-- CURRENCY -->
<div id="currency" class="panel">
  <h3>Currency Converter 💱</h3>

  <input id="amount" placeholder="Enter amount">

  <select id="from">
    <option>USD</option>
    <option>NGN</option>
  </select>

  <select id="to">
    <option>NGN</option>
    <option>USD</option>
  </select>

  <button onclick="convert()">Convert</button>

  <p id="result"></p>
</div>

<!-- UNIT -->
<div id="unit" class="panel">
  <h3>Unit Converter 📏</h3>

  <input id="unitValue" placeholder="Enter meters">

  <button onclick="unitConvert()">Convert to KM</button>

  <p id="unitResult"></p>
</div>

</div>

<script>
let display=document.getElementById("display");

function add(v){
  if(display.innerText==="0") display.innerText=v;
  else display.innerText+=v;
}

function calc(){
  try{
    display.innerText=Function("return "+display.innerText)();
  }catch{
    display.innerText="Error";
  }
}

function clearAll(){display.innerText="0";}
function back(){display.innerText=display.innerText.slice(0,-1)||"0";}

function show(id){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

/* FAKE PREMIUM CONVERTER */
function convert(){
  let amt=document.getElementById("amount").value;
  let from=document.getElementById("from").value;

  let rate=1500;

  document.getElementById("result").innerText =
  from==="USD" ? amt*rate+" NGN" : amt/rate+" USD";
}

/* UNIT */
function unitConvert(){
  let v=document.getElementById("unitValue").value;
  document.getElementById("unitResult").innerText=(v/1000)+" KM";
}
</script>

</body>
</html>
